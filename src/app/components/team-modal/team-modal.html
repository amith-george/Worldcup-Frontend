<div *ngIf="isVisible" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-0">
  <!-- Backdrop -->
  <div 
    class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity" 
    (click)="closeModal()">
  </div>

  <!-- Modal content -->
  <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform transition-all">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
      <h3 class="text-lg font-bold text-gray-900">Add New Team</h3>
      <button 
        (click)="closeModal()" 
        class="text-gray-400 hover:text-gray-600 transition-colors focus:outline-none p-1 rounded-md hover:bg-gray-100">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-6">
      <form [formGroup]="teamForm" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm flex items-center">
          <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
          {{ errorMessage }}
        </div>

        <div>
          <label for="teamName" class="block text-sm font-medium text-gray-700 mb-1">Team Name</label>
          <input 
            type="text" 
            id="teamName" 
            formControlName="teamName"
            class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all"
            [ngClass]="{'border-red-300 focus:ring-red-500 bg-red-50': teamForm.get('teamName')?.invalid && teamForm.get('teamName')?.touched}"
            placeholder="e.g. Argentina"
          />
          <div *ngIf="teamForm.get('teamName')?.invalid && teamForm.get('teamName')?.touched" class="text-red-500 text-xs mt-1.5 font-medium">
            Team name is required.
          </div>
        </div>

        <div>
          <label for="logoUrl" class="block text-sm font-medium text-gray-700 mb-1">Logo Image (Optional)</label>
          <input 
            type="file" 
            id="logoUrl" 
            accept="image/*"
            (change)="onFileSelected($event)"
            class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"
          />
        </div>

        <div class="mt-6 flex justify-end gap-3 pt-2">
          <button 
            type="button" 
            (click)="closeModal()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors">
            Cancel
          </button>
          <button 
            type="submit" 
            [disabled]="isLoading"
            class="px-4 py-2 text-sm font-medium text-white bg-gray-900 border border-transparent rounded-lg shadow-sm hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors flex items-center disabled:opacity-70 disabled:cursor-not-allowed">
            <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            {{ isLoading ? 'Saving...' : 'Add Team' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
