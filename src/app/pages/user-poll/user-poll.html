<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Vote for your team</h1>
        <p class="mt-2 text-sm text-gray-500">Select the team you believe will win.</p>
      </div>
      <div class="mt-4 sm:mt-0 flex gap-3">
        <button 
          (click)="goBack()"
          class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-colors">
          <svg class="-ml-1 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Polls
        </button>
      </div>
    </div>

    <!-- Alert: Already Voted -->
    <div *ngIf="hasVoted" class="mb-8 bg-red-50 border-l-4 border-red-400 p-4 rounded-md shadow-sm">
      <div class="flex items-center">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm font-medium text-red-800">You have already voted in this poll.</p>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>

    <!-- Voting Grid -->
    <div *ngIf="!isLoading" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">
      <div *ngFor="let team of teams" 
           class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col items-center p-6"
           [ngClass]="{'ring-2 ring-indigo-500 bg-indigo-50': votedTeamId === team.id}">
        
        <div class="h-24 w-24 bg-gray-100 rounded-full overflow-hidden flex items-center justify-center border border-gray-200 mb-4 shadow-sm">
          <img [src]="getLogoUrl(team.logoUrl)" alt="{{ team.teamName }} logo" class="h-20 w-20 object-contain" *ngIf="team.logoUrl" />
          <span *ngIf="!team.logoUrl" class="text-gray-400 font-medium text-2xl">{{ team.teamName.charAt(0) }}</span>
        </div>
        
        <h3 class="text-lg font-bold text-gray-900 mb-6 text-center truncate w-full">{{ team.teamName }}</h3>
        
        <button 
          (click)="voteForTeam(team.id)"
          [disabled]="hasVoted || isVoting"
          [ngClass]="(hasVoted || isVoting) ? 'bg-gray-300 cursor-not-allowed text-gray-500' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm'"
          class="mt-auto w-full inline-flex justify-center items-center px-4 py-2 border border-transparent rounded-lg text-sm font-medium focus:outline-none transition-colors">
          {{ votedTeamId === team.id ? 'Your Vote' : 'Vote' }}
        </button>
      </div>
    </div>

    <div *ngIf="!isLoading && teams.length === 0" class="text-center py-16 bg-white rounded-xl shadow-sm border border-gray-200">
      <p class="text-gray-500">No teams have been added to this poll yet.</p>
    </div>
  </div>
</div>
