<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl mx-auto">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Leaderboard</h1>
      </div>
      <div class="mt-4 sm:mt-0 flex gap-3">
        <button 
          (click)="goBack()"
          class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-colors">
          <svg class="-ml-1 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back
        </button>
        <button 
          *ngIf="isAdmin"
          (click)="toggleReveal()"
          [ngClass]="isRevealed ? 'bg-amber-100 text-amber-700 hover:bg-amber-200 border-amber-200' : 'bg-green-100 text-green-700 hover:bg-green-200 border-green-200'"
          class="inline-flex items-center px-4 py-2 border rounded-lg shadow-sm text-sm font-medium focus:outline-none transition-colors">
          <svg *ngIf="!isRevealed" class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          <svg *ngIf="isRevealed" class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
          </svg>
          {{ isRevealed ? 'Hide Results' : 'Reveal Results' }}
        </button>
        <button 
          *ngIf="isAdmin"
          (click)="openAddTeamModal()"
          class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-colors">
          <svg class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          Add New Team
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>

    <!-- Error State (e.g. 403 Forbidden because not revealed) -->
    <div *ngIf="!isLoading && errorMessage" class="bg-red-50 border-l-4 border-red-400 p-4 rounded-md">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-700">{{ errorMessage }}</p>
        </div>
      </div>
    </div>

    <!-- Results State -->
    <div *ngIf="!isLoading && !errorMessage" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <ul class="divide-y divide-gray-200">
        <li *ngFor="let team of results; let i = index" class="p-6 hover:bg-gray-50 transition-colors relative group">
          <div class="flex items-center space-x-6">
            <div class="flex-shrink-0 w-8 text-center">
              <span class="text-2xl font-bold text-gray-400" [ngClass]="{'text-yellow-500': i === 0, 'text-gray-400': i === 1, 'text-amber-600': i === 2}">
                #{{ i + 1 }}
              </span>
            </div>
            <div class="flex-shrink-0 h-16 w-16 bg-gray-100 rounded-full overflow-hidden flex items-center justify-center border border-gray-200">
              <img [src]="getLogoUrl(team.logoUrl)" alt="{{ team.teamName }} logo" class="h-12 w-12 object-contain" *ngIf="team.logoUrl" />
              <span *ngIf="!team.logoUrl" class="text-gray-400 font-medium text-lg">{{ team.teamName.charAt(0) }}</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-xl font-bold text-gray-900 truncate">{{ team.teamName }}</p>
            </div>
            <div class="flex-shrink-0 bg-indigo-50 px-4 py-2 rounded-lg mr-4">
              <p class="text-lg font-semibold text-indigo-700">{{ team.voteCount }} <span class="text-sm font-medium text-indigo-500">votes</span></p>
            </div>
            <button 
              *ngIf="isAdmin"
              (click)="deleteTeam(team.id, $event)"
              class="opacity-0 group-hover:opacity-100 transition-opacity p-2 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-full focus:outline-none"
              title="Delete Team">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </li>
      </ul>
      <div *ngIf="results.length === 0" class="p-8 text-center text-gray-500">
        No teams or votes found.
      </div>
    </div>
  </div>
</div>

<app-team-modal 
  *ngIf="isAdmin"
  [isVisible]="isModalVisible" 
  [pollId]="pollId"
  (close)="closeAddTeamModal()" 
  (teamAdded)="onTeamAdded()">
</app-team-modal>
